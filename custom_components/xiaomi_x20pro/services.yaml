clean_rooms:
  name: Clean rooms
  description: >-
    Start a room-by-room clean on a Xiaomi Vacuum X20 Pro (xiaomi.vacuum.d102gl).
    Optionally applies per-room settings first. Verifies the robot actually
    accepted the command (cloud ack alone is not enough) and retries if not.
  fields:
    entity_id:
      name: Vacuum entity
      description: The xiaomi_miot vacuum entity.
      required: true
      example: vacuum.xiaomi_d102gl_xxxx_robot_cleaner
      selector:
        entity:
          domain: vacuum
    rooms:
      name: Rooms
      description: >-
        Map room IDs to clean, e.g. [8] or [8, 13]. Read your current map's IDs
        from the entity attribute vacuum.room_information — IDs change every
        time the map is remade, and they do NOT match the room numbers shown in
        the Xiaomi Home app.
      required: true
      example: "[8, 13]"
      selector:
        object:
    fan_level:
      name: Fan level
      description: "Per-room suction: 1=Silent 2=Basic 3=Strong 4=Full Speed. Omit to keep the room's stored setting."
      selector:
        number:
          min: 1
          max: 4
    water_level:
      name: Water level
      description: "Per-room mop water: 0=Off 1=Low 2=Medium 3=High. Omit to keep the room's stored setting."
      selector:
        number:
          min: 0
          max: 3
    clean_mode:
      name: Clean mode
      description: "Per-room mode: 1=Sweep 2=Mop 3=Sweep+Mop 4=Sweep then Mop. Omit to keep the room's stored setting."
      selector:
        number:
          min: 1
          max: 4
    clean_times:
      name: Passes
      description: Per-room number of passes (1-3). Omit to keep the room's stored setting.
      selector:
        number:
          min: 1
          max: 3
    retries:
      name: Retries
      description: How many times to re-fire the start command if the robot does not accept it (default 5).
      selector:
        number:
          min: 0
          max: 30
    retry_delay:
      name: Retry delay
      description: Seconds to wait for acceptance before re-firing (default 25).
      selector:
        number:
          min: 5
          max: 120
          unit_of_measurement: seconds

set_room_config:
  name: Set room config
  description: >-
    Store per-room cleaning settings (fan/water/mode/passes) without starting a
    clean. Accepted by the cloud even while the robot is in deep sleep; never
    moves the robot.
  fields:
    entity_id:
      name: Vacuum entity
      description: The xiaomi_miot vacuum entity.
      required: true
      example: vacuum.xiaomi_d102gl_xxxx_robot_cleaner
      selector:
        entity:
          domain: vacuum
    rooms:
      name: Rooms
      description: Map room IDs to configure, e.g. [8] or [8, 13].
      required: true
      example: "[8]"
      selector:
        object:
    fan_level:
      name: Fan level
      description: "1=Silent 2=Basic 3=Strong 4=Full Speed (default 3)."
      selector:
        number:
          min: 1
          max: 4
    water_level:
      name: Water level
      description: "0=Off 1=Low 2=Medium 3=High (default 2)."
      selector:
        number:
          min: 0
          max: 3
    clean_mode:
      name: Clean mode
      description: "1=Sweep 2=Mop 3=Sweep+Mop 4=Sweep then Mop (default 3)."
      selector:
        number:
          min: 1
          max: 4
    clean_times:
      name: Passes
      description: Number of passes 1-3 (default 1).
      selector:
        number:
          min: 1
          max: 3
